<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANGUARD MD Pair Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', system-ui;
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }
    .card {
      max-width: 460px;
      margin: 40px auto;
      background: white;
      color: #111;
      border-radius: 20px;
      padding: 35px 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .logo { width: 90px; height: 90px; background: #000; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 42px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { color: #555; margin-bottom: 25px; }
    input {
      width: 100%;
      padding: 16px 20px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 500;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #000;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 25px;
    }
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      margin: 30px 0;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .code-box {
      background: #f8f8f8;
      border-radius: 16px;
      padding: 25px 15px;
      font-size: 32px;
      letter-spacing: 12px;
      font-weight: 600;
      margin: 20px 0;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .copy-btn {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    footer { margin-top: 40px; font-size: 13px; color: #888; }
    .error { color: #e11d48; font-weight: 500; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🤖</div>
    <h1>VANGUARD MD</h1>
    <p>Pair Code • Link your WhatsApp device</p>

    <input type="text" id="phone" placeholder="256745626308" required>

    <button onclick="generatePairCode()">🔑 Generate Pair Code</button>

    <!-- Loading Animation -->
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <strong>Requesting pair code from WhatsApp...</strong>
      <small style="color:#666; margin-top:8px;">This usually takes 5–20 seconds</small>
    </div>

    <!-- Result -->
    <div id="result" style="display:none;">
      <div class="code-box" id="codeDisplay">••••-••••-••••</div>
      <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
      <small style="color:#555; display:block; margin-top:15px;">
        WhatsApp → Linked Devices → Link with phone number
      </small>
    </div>

    <div id="errorMsg" class="error" style="display:none;"></div>
  </div>

  <footer>
    © 2026 Mr.Admin Blue | VANGUARD MD<br>
    All rights reserved 🔥
  </footer>

  <script>
    let currentSessionId = null;
    let currentCode = '';

    async function generatePairCode() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone || phone.length < 9) {
        showError('Please enter a valid number (e.g. 256745626308)');
        return;
      }

      // Reset
      document.getElementById('result').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';
      const loader = document.getElementById('loader');
      loader.style.display = 'flex';

      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      });

      const data = await res.json();
      if (!data.success) {
        loader.style.display = 'none';
        showError(data.error || 'Failed to start pairing');
        return;
      }

      currentSessionId = data.sessionId;

      // SSE for real-time code or error
      const evtSource = new EventSource(`/events?sessionId=${currentSessionId}`);
      evtSource.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        loader.style.display = 'none';

        if (msg.error) {
          showError(msg.error);
        } else if (msg.code) {
          currentCode = msg.code;
          document.getElementById('codeDisplay').textContent = msg.code;
          document.getElementById('result').style.display = 'block';
        }
      };
    }

    function showError(text) {
      const err = document.getElementById('errorMsg');
      err.textContent = text;
      err.style.display = 'block';
    }

    function copyCode() {
      if (!currentCode) return;
      navigator.clipboard.writeText(currentCode).then(() => {
        const btn = document.querySelector('.copy-btn');
        const original = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    }
  </script>
</body>
</html>
